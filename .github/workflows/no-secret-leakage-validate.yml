name: no-secret-leakage-validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  no-secret-leakage-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Phase 2 requirements
        run: pip install -r operations/harness-phase2/requirements.txt

      - name: Run no-secret-leakage validation test
        run: bash operations/harness-openclaw-safety-validation/tests/test_no_secret_leakage_validation.sh
